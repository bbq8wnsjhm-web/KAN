<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse Atelier — WebGL Demo</title>
  <meta name="description" content="Эффектный трехэкранный прототип с WebGL-фоном" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas class="webgl-bg" aria-hidden="true"></canvas>
  <div class="noise" aria-hidden="true"></div>

  <div class="cursor-dot" aria-hidden="true"></div>
  <div class="cursor-ring" aria-hidden="true"></div>

  <main>
    <section id="hero" class="panel container reveal">
      <article class="frame">
        <p class="frame-note">каждый цвет живет своей таинственной жизнью</p>
        <h1>Прототип</h1>
        <p class="word word-center">увидеть</p>
      </article>
    </section>

    <section id="showcase" class="panel container reveal">
      <article class="frame">
        <p class="frame-note">каждый цвет живет своей таинственной жизнью</p>
        <p class="word word-left">ощутить</p>
      </article>
    </section>

    <section id="contact" class="panel container reveal">
      <article class="frame">
        <p class="frame-note">каждый цвет живет своей таинственной жизнью</p>
        <p class="word word-right">потрогать</p>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
