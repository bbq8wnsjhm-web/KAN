<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse Atelier — WebGL Demo</title>
  <meta name="description" content="Эффектный трехэкранный прототип с WebGL-фоном" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=20260318-1" />
</head>
<body>
  <div class="background-media" aria-hidden="true" style="position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;">
    <video class="liquid-bg" autoplay muted loop playsinline preload="auto" tabindex="-1" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
      <source src="media/liquid2.mp4" type="video/mp4" />
    </video>
    <canvas class="webgl-bg" aria-hidden="true" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;"></canvas>
    <div class="liquid-overlay"></div>
    <div class="noise"></div>
  </div>
  <div class="color-orb" aria-hidden="true"></div>

  <div class="cursor-dot" aria-hidden="true"></div>
  <div class="cursor-ring" aria-hidden="true"></div>

  <main style="position:relative;z-index:5;">
    <section id="hero" class="panel container reveal" data-tone="calm">
      <article class="frame">
        <p class="frame-note motion-fade">каждый цвет живет своей таинственной жизнью</p>
        <h1 class="motion-heading">Прототип</h1>
        <p class="word word-center motion-word" data-color="#ff8a4c">увидеть</p>
      </article>
    </section>

    <section id="showcase" class="panel container reveal" data-tone="expressive">
      <article class="frame">
        <p class="frame-note motion-fade">каждый цвет живет своей таинственной жизнью</p>
        <p class="word word-left motion-word" data-color="#5ab7ff">ощутить</p>
      </article>
    </section>

    <section id="contact" class="panel container reveal" data-tone="calm">
      <article class="frame">
        <p class="frame-note motion-fade">каждый цвет живет своей таинственной жизнью</p>
        <p class="word word-right motion-word" data-color="#d884ff">потрогать</p>
      </article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="script.js?v=20260318-1"></script>
</body>
</html>
